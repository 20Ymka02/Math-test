<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Math Quize Assignment</title>
</head>
<body>
    <h1>Math Quiz</h1>
    <form onsubmit="alert('Thank you for taking the test!'); return false;">
        <p>
            <label for="username">Enter your name:</label><br>
            <input type="text" id="username" name="username" required>
        </p>
        <hr>
        <p>1. What is 5 &times; 5?</p>
        <input type="radio" id="q1a" name="q1" value="15">
        <label for="q1a">15</label><br>
        <input type="radio" id="q1b" name="q1" value="20">
        <label for="q1b">20</label><br>
        <input type="radio" id="q1c" name="q1" value="25">
        <label for="q1c">25</label>

        <p>2. In the equation x + y(b &minus; 1), which operation goes first?</p>
        <input type="radio" id="q2a" name="q2" value="plus">
        <label for="q2a">+</label><br>
        <input type="radio" id="q2b" name="q2" value="minus">
        <label for="q2b">&minus;</label><br>
        <input type="radio" id="q2c" name="q2" value="multiplication">
        <label for="q2c">&times;</label>

        <p>3. What is &radic;225?</p>
        <input type="radio" id="q3a" name="q3" value="5">
        <label for="q3a">5</label><br>
        <input type="radio" id="q3b" name="q3" value="15">
        <label for="q3b">15</label><br>
        <input type="radio" id="q3c" name="q3" value="25">
        <label for="q3c">25</label>
        <hr>
        <p>4. A store had 3 boxes of apples. They sold 1.5 boxes. How many boxes left? (Describe your answer):</p>
        <textarea name="word_problem" rows="4" cols="50" placeholder="Type your answer here..."></textarea>
        <br><br>
        <button type="submite">Submite Test</button>
    </form>
</body>
</html>
